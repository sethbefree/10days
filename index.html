<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seoul Weather — Production</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream:   #f5f0e8;
  --parchment: #ede5d8;
  --warm-white: #faf7f2;
  --ink:     #1c1612;
  --brown:   #3d2b1f;
  --tan:     #8b6f5e;
  --gold:    #b8966a;
  --gold-lt: #d4b896;
  --rule:    #d6c9b8;
  --muted:   #9e8e80;
  --rain:    #6b8fa3;
  --sun:     #c9952a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  padding: 0;
}

/* ── Header ── */
.header {
  background: var(--brown);
  padding: 24px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid var(--gold);
}
.header-left {}
.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold-lt);
  margin-bottom: 4px;
}
.title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 300;
  color: var(--warm-white);
  letter-spacing: 0.05em;
}
.title em {
  font-style: italic;
  color: var(--gold-lt);
}
.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
.upd {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  color: #a08878;
}
.rf-btn {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold-lt);
  font-family: 'Jost', sans-serif;
  font-weight: 400;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 6px 18px;
  cursor: pointer;
  transition: all 0.2s;
}
.rf-btn:hover { background: var(--gold); color: var(--brown); }

/* ── Wrap ── */
.wrap { max-width: 1100px; margin: 0 auto; padding: 36px 40px; }

/* ── Source badges ── */
.badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}
.badge {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 14px;
  border: 1px solid var(--rule);
  background: var(--warm-white);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 400;
}
.badge-dot { width: 5px; height: 5px; border-radius: 50%; }
.badge-name { color: var(--brown); font-weight: 500; }
.badge-days { color: var(--muted); }

/* ── Rule ── */
.rule {
  height: 1px;
  background: linear-gradient(to right, var(--gold), var(--rule), transparent);
  margin-bottom: 28px;
}

/* ── Table ── */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { border-collapse: collapse; width: 100%; min-width: 820px; }

/* Header row */
.th-source {
  padding: 12px 20px;
  text-align: left;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 400;
  border-bottom: 2px solid var(--gold);
  width: 140px;
  white-space: nowrap;
  background: var(--warm-white);
}
.th-date {
  padding: 12px 6px;
  min-width: 76px;
  text-align: center;
  border-bottom: 2px solid var(--rule);
  background: var(--warm-white);
}
.th-date.today { border-bottom-color: var(--gold); background: #fdf8f0; }
.th-date.sun .date-md { color: #8b4a3a; }
.th-date.sat .date-md { color: var(--rain); }

.date-md {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 400;
  color: var(--brown);
  line-height: 1.2;
}
.th-date.today .date-md { color: var(--gold); }
.date-wd {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 2px;
}
.th-date.today .date-wd { color: var(--gold-lt); }

/* Body rows */
tr { border-bottom: 1px solid var(--parchment); }
tr:last-child { border-bottom: none; }
tr:hover td { background: #fdf9f4; }

.td-source {
  padding: 14px 20px;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
  white-space: nowrap;
  border-right: 1px solid var(--rule);
  background: var(--warm-white);
}
.td-cell {
  padding: 10px 4px;
  text-align: center;
  border-left: 1px solid var(--parchment);
  min-width: 76px;
  background: var(--cream);
  transition: background 0.15s;
}
.td-cell.today { background: #fdf8f0; }

.cell-icon { font-size: 20px; line-height: 1.3; }
.cell-max {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--brown);
  line-height: 1.2;
}
.cell-min {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-weight: 300;
  color: var(--tan);
  line-height: 1.2;
}
.cell-pop {
  font-size: 10px;
  letter-spacing: 0.05em;
  margin-top: 2px;
  color: var(--muted);
}
.cell-pop.hi { color: var(--rain); }
.cell-dash { color: var(--rule); font-size: 14px; }
.cell-err { color: var(--rule); font-size: 9px; letter-spacing: 0.1em; }

/* ── Loading ── */
.loading {
  text-align: center;
  padding: 80px 20px;
  background: var(--warm-white);
  border: 1px solid var(--rule);
}
.loading-icon {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-style: italic;
  color: var(--gold);
  margin-bottom: 16px;
}
.loading-text {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--tan);
}
.loading-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 8px;
  font-style: italic;
}

/* ── Footer legend ── */
.legend {
  margin-top: 20px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  align-items: center;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  padding-top: 16px;
  border-top: 1px solid var(--rule);
}
.legend-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
}
.legend-note { margin-left: auto; font-style: italic; text-transform: none; letter-spacing: 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="brand">Coach — Production Weather</div>
    <div class="title">Seoul <em>10-Day</em> Forecast</div>
  </div>
  <div class="header-right">
    <div class="upd" id="upd">—</div>
    <button class="rf-btn" id="rfBtn">Refresh</button>
  </div>
</div>

<div class="wrap">
  <div id="badges" class="badges"></div>
  <div class="rule"></div>
  <div id="content">
    <div class="loading">
      <div class="loading-icon">Fetching</div>
      <div class="loading-text">Retrieving data from 6 sources</div>
      <div class="loading-sub">This takes a few seconds on first load</div>
    </div>
  </div>
  <div class="legend">
    <span><span class="legend-dot" style="background:var(--brown)"></span>High</span>
    <span><span class="legend-dot" style="background:var(--tan)"></span>Low</span>
    <span><span class="legend-dot" style="background:var(--rain)"></span>Rain %</span>
    <span class="legend-note">KMA available from day 3 onward</span>
  </div>
</div>

<script>
var WD = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function getDates() {
  var dates = [];
  var kst = new Date(Date.now() + 9 * 3600000);
  for (var i = 0; i < 10; i++) {
    var d = new Date(kst.getTime() + i * 86400000);
    var y = d.getUTCFullYear();
    var m = String(d.getUTCMonth() + 1).padStart(2, '0');
    var day = String(d.getUTCDate()).padStart(2, '0');
    dates.push(y + '-' + m + '-' + day);
  }
  return dates;
}

function todayKST() { return getDates()[0]; }

function load() {
  document.getElementById('upd').textContent = 'Updating...';
  document.getElementById('badges').innerHTML = '';
  document.getElementById('rfBtn').disabled = true;
  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="loading-icon">Fetching</div>' +
    '<div class="loading-text">Retrieving data from 6 sources</div>' +
    '<div class="loading-sub">This takes a few seconds on first load</div></div>';

  fetch('/api/weather')
    .then(function(r) { return r.json(); })
    .then(function(json) {
      var upd = new Date(json.updated);
      var hh = upd.getUTCHours() + 9;
      if (hh >= 24) hh -= 24;
      var mm = String(upd.getUTCMinutes()).padStart(2,'0');
      document.getElementById('upd').textContent =
        'Updated ' + String(hh).padStart(2,'0') + ':' + mm + ' KST';
      renderBadges(json.sources);
      renderTable(json.sources);
    })
    .catch(function(e) {
      document.getElementById('content').innerHTML =
        '<div class="loading"><div class="loading-text" style="color:#8b4a3a">Failed to load — please refresh</div>' +
        '<div class="loading-sub">' + e.message + '</div></div>';
      document.getElementById('upd').textContent = 'Error';
    })
    .finally(function() {
      document.getElementById('rfBtn').disabled = false;
    });
}

function renderBadges(sources) {
  var colors = ['#6b8c6b','#6b8fa3','#a07850','#8b6f9e','#c9952a','#5a7a8a'];
  var html = '';
  for (var i = 0; i < sources.length; i++) {
    var s = sources[i];
    var c = s.error ? '#c0a090' : colors[i % colors.length];
    html += '<div class="badge">' +
      '<div class="badge-dot" style="background:' + c + '"></div>' +
      '<span class="badge-name" style="color:' + c + '">' + s.name + '</span>' +
      '<span class="badge-days">' + (s.error ? 'error' : s.data.length + ' days') + '</span>' +
      '</div>';
  }
  document.getElementById('badges').innerHTML = html;
}

function renderTable(sources) {
  var colors = ['#6b8c6b','#6b8fa3','#a07850','#8b6f9e','#c9952a','#5a7a8a'];
  var dates = getDates();
  var today = todayKST();

  var hdr = '<th class="th-source">Source</th>';
  for (var i = 0; i < dates.length; i++) {
    var d = dates[i];
    var p = d.split('-');
    var dt = new Date(Date.UTC(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2])));
    var md = (dt.getUTCMonth()+1) + '/' + dt.getUTCDate();
    var wd = WD[dt.getUTCDay()];
    var cls = d === today ? 'today' : dt.getUTCDay()===0 ? 'sun' : dt.getUTCDay()===6 ? 'sat' : '';
    hdr += '<th class="th-date ' + cls + '">' +
      '<div class="date-md">' + md + '</div>' +
      '<div class="date-wd">' + wd + '</div></th>';
  }

  var rows = '';
  for (var si = 0; si < sources.length; si++) {
    var src = sources[si];
    var col = colors[si % colors.length];
    rows += '<tr><td class="td-source" style="color:' + col + '">' + src.name + '</td>';
    for (var di = 0; di < dates.length; di++) {
      var date = dates[di];
      var c = null;
      for (var ci = 0; ci < (src.data||[]).length; ci++) {
        if (src.data[ci].date === date) { c = src.data[ci]; break; }
      }
      var isToday = date === today;
      var tdCls = 'td-cell' + (isToday ? ' today' : '');
      if (!c) {
        rows += '<td class="' + tdCls + '">' +
          '<span class="' + (src.error ? 'cell-err' : 'cell-dash') + '">' +
          (src.error ? 'n/a' : '—') + '</span></td>';
      } else {
        var pop = c.pop || 0;
        var popCls = pop >= 40 ? 'cell-pop hi' : 'cell-pop';
        rows += '<td class="' + tdCls + '">' +
          '<div class="cell-icon">' + (c.icon||'🌤️') + '</div>' +
          '<div class="cell-max">' + (c.max!=null ? c.max+'°' : '—') + '</div>' +
          '<div class="cell-min">' + (c.min!=null ? c.min+'°' : '—') + '</div>' +
          '<div class="' + popCls + '">' + pop + '%</div>' +
          '</td>';
      }
    }
    rows += '</tr>';
  }

  document.getElementById('content').innerHTML =
    '<div class="table-wrap"><table>' +
    '<thead><tr>' + hdr + '</tr></thead>' +
    '<tbody>' + rows + '</tbody>' +
    '</table></div>';
}

document.getElementById('rfBtn').addEventListener('click', function() { load(); });
load();
</script>
</body>
</html>
